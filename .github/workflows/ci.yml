name: Qualidade e Testes

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  testes-e-qualidade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Validar formatação (Black)
      run: black --check .
      
    - name: Validar estilo (Flake8)
      run: flake8 .
      
    - name: Iniciar servidor para testes E2E
      run: |
        nohup python run.py > flask.log 2>&1 &
        sleep 5
        
    - name: Executar todos os testes (Pytest)
      run: python -m pytest
